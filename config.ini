[DJANGO]
debug = true
allowed_hosts = 127.0.0.1,localhost

[TELEGRAM]
; BotFather で取得した Bot Token を入れてください
; 例: bot_token = 1234567890:ABCDefGhIJKlmNOpqrSTUvwxYZ
bot_token =
; Webhook のセキュリティ用シークレット（任意の文字列）
; Telegram の setWebhook で secret_token パラメータに同じ値を設定する
webhook_secret =
; ボットがユーザーに送る URL のベース（ログインページ等）
; ngrok 使用時は ngrok の https URL に変更する
portal_base_url = http://127.0.0.1:8000

[OTP]
; OTPセッションの有効期間（秒）
ttl_seconds = 300
; 最大試行回数（超過でLOCK）
max_attempts = 5
; 同一login_idへの連続送信を抑止するクールダウン（秒）
cooldown_seconds = 60

[KYC]
; アップロード最大ファイルサイズ（バイト）: デフォルト 5MB
max_upload_bytes = 5242880
; ユーザーあたり最大アップロード枚数
max_images_per_user = 5
; プレビュートークン有効期間（秒）
blob_token_ttl_seconds = 60
; 透かし文字サイズ（px）
watermark_font_size = 22
; 透かし余白（px）
watermark_margin_px = 16
